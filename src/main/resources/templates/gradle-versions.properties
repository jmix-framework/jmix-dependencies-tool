# Recommended Gradle distribution per Jmix line, used as the generated wrapper's distributionUrl.
# Checkpoint selection (same as build-template selection): the highest version key <= the requested
# version wins. Keys ending in ".x" are treated as ".0" (e.g. 2.x == checkpoint 2.0); "default" is the
# fallback when no version key matches. So a key applies to that version and all later ones until the
# next key. Example: with 2.x and 3.x present, 2.0.0..2.9.x -> 2.x, 3.0.0+ -> 3.x.
#
# deptool runs each resolution on its own wrapper-downloaded Gradle (a separate process), so the tool's
# own Gradle/JVM is decoupled from the daemon. The only requirement is that deptool's JVM can launch the
# daemon (JDK 17 covers Gradle 7.x through 9.x). To support a new line on a different Gradle, add one line.

3.0     = 9.5.1
2.0     = 8.14.4
1.0     = 7.6.4
